<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Анкета соискателя — ПВЗ</title>
<style>
:root{--ozon:#005BFF;--wb:#CB11AB;--ym:#FFCC00;--ym-text:#333;--bg:#f4f6f9;--surface:#fff;--text:#1a1a2e;--text2:#5a6a7a;--border:#dce3ed;--radius:14px;--radius-sm:8px;--shadow:0 2px 8px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.1);--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.app{min-height:100vh;display:flex;flex-direction:column}
.container{max-width:720px;margin:0 auto;padding:0 20px;width:100%}

/* Header — градиент Ozon → WB → YM */
.header{
  background:linear-gradient(135deg,var(--ozon) 0%,#3a7bff 25%,var(--wb) 55%,#e03db3 65%,var(--ym) 100%);
  color:#fff;padding:36px 0 28px;position:relative;overflow:hidden
}
.header::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 40%,rgba(255,204,0,.35),transparent 60%);
  pointer-events:none
}
.header .container{position:relative;z-index:1}
.header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.3px}
.header .sub{opacity:.9;font-size:.95rem;margin-top:4px}

.form{padding:28px 0}
.sec{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.step{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--ozon),var(--wb));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;flex-shrink:0
}
.sec-hdr h2{font-size:1.1rem;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

.fg{margin-bottom:0}
.fg label{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px;color:var(--text2);letter-spacing:.2px}
input,textarea,select{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:.92rem;font-family:inherit;background:var(--surface);color:var(--text);
  transition:border-color .25s,box-shadow .25s;outline:none
}
input:focus,textarea:focus,select:focus{
  border-color:var(--ozon);
  box-shadow:0 0 0 3px rgba(0,91,255,.12)
}
textarea{resize:vertical;min-height:70px}

/* Селфи */
.selfie-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.selfie-wrap input[type="file"]{display:none}
.selfie-pv{
  width:200px;height:200px;border-radius:50%;
  border:3px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .25s;overflow:hidden;background:var(--bg);position:relative
}
.selfie-pv:hover{border-color:var(--ozon);background:linear-gradient(135deg,rgba(0,91,255,.04),rgba(203,17,171,.04))}
.selfie-pv.has{border-style:solid;border-color:var(--wb)}
.selfie-pv img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%}
.sp-icon{font-size:3rem;pointer-events:none;position:relative;z-index:1}
.sp-hint{font-size:.8rem;color:var(--text2);margin-top:4px;pointer-events:none;position:relative;z-index:1}

/* Кнопки */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border:1.5px solid transparent;border-radius:var(--radius-sm);font-size:.88rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .25s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{
  background:linear-gradient(135deg,var(--ozon),var(--wb));
  color:#fff;border:none
}
.btn-p:hover:not(:disabled){
  background:linear-gradient(135deg,#004ad4,#a8158f);
  box-shadow:0 4px 15px rgba(0,91,255,.3)
}
.btn-o{background:transparent;color:var(--text);border-color:var(--border)}
.btn-o:hover{border-color:var(--ozon);color:var(--ozon)}
.btn-lg{padding:14px 32px;font-size:1rem;border-radius:10px}

.err{
  background:#fff0f0;color:#d32f2f;
  border:1px solid #ffcdd2;border-radius:var(--radius-sm);
  padding:12px 16px;font-size:.88rem;margin-bottom:14px;display:none
}
.success{text-align:center;padding:48px 20px;display:none}
.success .si{font-size:3rem;display:block;margin-bottom:12px}
.success h3{font-size:1.25rem;margin-bottom:8px}
.success p{color:var(--text2);margin-bottom:22px}

.acts{text-align:center;padding:6px 0 36px}
.loader{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{margin-top:auto;text-align:center;padding:18px 0;color:var(--text2);font-size:.82rem}

@media(max-width:480px){
  .container{padding:0 12px}
  .header{padding:24px 0 18px}
  .header h1{font-size:1.25rem}
  .header .sub{font-size:.85rem}
  .form{padding:16px 0}
  .sec{padding:16px;border-radius:12px;margin-bottom:12px}
  .sec-hdr{margin-bottom:14px}
  .sec-hdr h2{font-size:1rem}
  .step{width:26px;height:26px;font-size:.75rem}
  .grid{gap:10px}
  input,textarea,select{padding:10px 12px;font-size:.88rem}
  .selfie-pv{width:150px;height:150px}
  .sp-icon{font-size:2.2rem}
  .btn-lg{padding:13px 20px;font-size:.92rem;width:100%}
  .err{font-size:.82rem;padding:10px 14px}
  .success{padding:32px 12px}
  .success .si{font-size:2.2rem}
  .footer{padding:14px 0;font-size:.78rem}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="container">
      <h1>Анкета соискателя</h1>
      <p class="sub">Работа на пункте выдачи заказов</p>
    </div>
  </header>

  <main class="container">
    <form id="form" class="form" novalidate>
      <div class="sec">
        <div class="sec-hdr"><span class="step">1</span><h2>Личные данные</h2></div>
        <div class="grid">
          <div class="fg"><label for="fn">ФИО *</label><input type="text" id="fn" required placeholder="Иванов Иван Иванович"></div>
          <div class="fg"><label for="bd">Дата рождения</label><input type="date" id="bd"></div>
          <div class="fg"><label for="ph">Телефон *</label><input type="tel" id="ph" required placeholder="+7 (999) 123-45-67" inputmode="numeric" value="+7"></div>
          <div class="fg"><label for="em">Telegram</label><input type="text" id="em" placeholder="@username или t.me/username"></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-hdr"><span class="step">2</span><h2>О себе</h2></div>
        <div class="fg" style="margin-bottom:12px"><label for="exp">Опыт работы</label><textarea id="exp" rows="3" placeholder="Где и кем работали ранее"></textarea></div>
        <div class="fg" style="margin-bottom:12px"><label for="edu">Образование</label><select id="edu"><option value="">— выберите —</option><option value="учится">Учусь</option><option value="высшее">Высшее</option><option value="среднее">Среднее</option><option value="планирует">Планирую поступать</option><option value="не_планирует">Не планирую учиться</option></select></div>
        <div class="fg"><label for="ab">О себе</label><textarea id="ab" rows="4" placeholder="Почему хотите работать на ПВЗ"></textarea></div>
      </div>

      <div class="sec">
        <div class="sec-hdr"><span class="step">3</span><h2>Селфи</h2></div>
        <div class="selfie-wrap">
          <label class="selfie-pv" id="spv" for="selfie">
            <span class="sp-icon">📸</span>
            <p class="sp-hint">Нажмите для загрузки</p>
          </label>
          <input type="file" id="selfie" accept="image/*">
          <button type="button" class="btn btn-p" id="selfie-btn">Выбрать фото</button>
        </div>
      </div>

      <div class="sec">
        <div class="sec-hdr"><span class="step">4</span><h2>Выбор адреса ПВЗ</h2></div>
        <div class="fg" style="margin-bottom:10px"><label for="addr1">Желаемый адрес ПВЗ *</label><select id="addr1" required></select></div>
        <div class="fg" style="margin-bottom:10px"><label for="addr2">Резервный адрес 1</label><select id="addr2"></select></div>
        <div class="fg"><label for="addr3">Резервный адрес 2</label><select id="addr3"></select></div>
      </div>

      <div class="err" id="err"></div>

      <div class="success" id="success">
        <span class="si">✅</span>
        <h3>Анкета отправлена!</h3>
        <p>Спасибо, ваша анкета принята. Мы свяжемся с вами.</p>
        <button type="button" class="btn btn-p" id="again">Заполнить ещё раз</button>
      </div>

      <div class="acts"><button type="submit" class="btn btn-p btn-lg" id="submit-btn"><span id="btn-text">Отправить анкету</span><span class="loader" id="btn-loader"></span></button></div>
    </form>
  </main>

  <footer class="footer"><div class="container"><p>Работа на ПВЗ © 2026</p></div></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://jqseowqgwvyjbagzkwpm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxc2Vvd3Fnd3Z5amJhZ3prd3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTM1NDEsImV4cCI6MjA5ODEyOTU0MX0.6PA1jsxwR0wg9S6sH8QgcKQJ3qo5N4QjEPVTMNR7L2Y';
let sb;
try{sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)}catch(e){console.warn('Supabase init error',e)}

const ADDRS = [
  {addr:'Северная 9', mp:'ozon', label:'Ozon — Северная 9'},
  {addr:'Ольховая 2а', mp:'ozon', label:'Ozon — Ольховая 2а'},
  {addr:'Яковлева 46', mp:'ozon', label:'Ozon — Яковлева 46'},
  {addr:'Киренского 126', mp:'yandex_market', label:'Яндекс Маркет — Киренского 126'}
];

const form=document.getElementById('form'), selfieInp=document.getElementById('selfie'), spv=document.getElementById('spv'), selfieBtn=document.getElementById('selfie-btn');
const a1=document.getElementById('addr1'), a2=document.getElementById('addr2'), a3=document.getElementById('addr3');
const subBtn=document.getElementById('submit-btn'), btnText=document.getElementById('btn-text'), btnLoad=document.getElementById('btn-loader');
const errEl=document.getElementById('err'), successEl=document.getElementById('success'), againBtn=document.getElementById('again');
const phInp=document.getElementById('ph');
let selFile=null;

// --- Маска телефона +7 ---
phInp.addEventListener('input',function(){
  let digs=this.value.replace(/\D/g,'');
  if(digs.startsWith('8'))digs='7'+digs.slice(1);
  if(digs.length===1&&digs[0]==='7'){this.value='+7';return}
  if(!digs.startsWith('7'))digs='7'+digs;
  digs=digs.slice(1,11);
  let s='+7';
  if(digs.length>0)s+=' ('+digs.slice(0,3);
  if(digs.length>3)s+=') '+digs.slice(3,6);
  if(digs.length>6)s+='-'+digs.slice(6,8);
  if(digs.length>8)s+='-'+digs.slice(8,10);
  this.value=s;
});

// --- Селфи ---
selfieBtn.addEventListener('click',()=>selfieInp.click());

selfieInp.addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f)return;
  if(!f.type.startsWith('image/'))return showErr('Выберите изображение');
  if(f.size>5*1024*1024)return showErr('Файл больше 5 МБ');
  selFile=f;
  const r=new FileReader();
  r.onload=ev=>{spv.innerHTML=`<img src="${ev.target.result}" alt="селфи">`;spv.classList.add('has')};
  r.readAsDataURL(f);hideErr()
});

// --- Адреса ---
function fillAddrs(){
  const taken=[a1.value,a2.value,a3.value].filter(v=>v);
  [a1,a2,a3].forEach(sel=>{
    const cur=sel.value;
    sel.innerHTML='<option value="">— выберите адрес —</option>';
    ADDRS.forEach(({addr,label})=>{
      const o=document.createElement('option');o.value=addr;o.textContent=label;
      if(taken.includes(addr)&&addr!==cur)o.disabled=true;
      sel.appendChild(o)
    });
    if([...sel.options].some(o=>o.value===cur))sel.value=cur;else sel.value=''
  })
}
[a1,a2,a3].forEach(sel=>sel.addEventListener('change',fillAddrs));
fillAddrs();

// --- Отправка ---
form.addEventListener('submit',async e=>{
  e.preventDefault();hideErr();
  const selAddr=a1.value;
  const found=ADDRS.find(a=>a.addr===selAddr);
  if(!found)return showErr('Выберите желаемый адрес ПВЗ');
  const mpVal=found.mp;
  const phone=phInp.value.trim();
  const pdigs=phone.replace(/\D/g,'');
  if(pdigs.length<7)return showErr('Введите номер телефона — минимум 7 цифр после +7');
  const data={
    full_name:document.getElementById('fn').value.trim(),
    phone,
    email:document.getElementById('em').value.trim(),
    birth_date:document.getElementById('bd').value||null,
    experience:document.getElementById('exp').value.trim(),
    education:document.getElementById('edu').value.trim(),
    about:document.getElementById('ab').value.trim(),
    marketplace:mpVal,
    primary_address:a1.value,
    backup_address_1:a2.value||null,
    backup_address_2:a3.value||null
  };
  if(!data.full_name)return showErr('Укажите ФИО');
  if(!data.primary_address)return showErr('Выберите желаемый адрес ПВЗ');
  if(data.backup_address_1===data.primary_address)return showErr('Резервный адрес совпадает с желаемым');
  if(data.backup_address_2===data.primary_address)return showErr('Резервный адрес совпадает с желаемым');
  if(data.backup_address_2&&data.backup_address_2===data.backup_address_1)return showErr('Резервные адреса совпадают');
  if(!sb)return showErr('Сервер базы данных не загружен. Проверьте подключение к интернету.');

  setLoad(true);
  try{
    let selfieUrl=null;
    if(selFile){
      const ext=selFile.name.split('.').pop();
      const path=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error:upErr}=await sb.storage.from('selfies').upload(path,selFile,{contentType:selFile.type});
      if(upErr)throw upErr;
      const {data:{publicUrl}}=sb.storage.from('selfies').getPublicUrl(path);
      selfieUrl=publicUrl
    }
    const {error}=await sb.from('applications').insert({...data,selfie_url:selfieUrl,status:'new'});
    if(error)throw error;
    form.hidden=true;successEl.style.display='block';errEl.style.display='none'
  }catch(e){
    console.error(e);showErr(e.message||'Ошибка отправки')
  }finally{setLoad(false)}
});

againBtn.addEventListener('click',()=>{
  form.reset();form.hidden=false;successEl.style.display='none';selFile=null;
  spv.innerHTML='<span class="sp-icon">📸</span><p class="sp-hint">Нажмите для загрузки</p>';
  spv.classList.remove('has');
  fillAddrs();
  hideErr();window.scrollTo({top:0,behavior:'smooth'})
});

function showErr(m){errEl.textContent=m;errEl.style.display='block'}
function hideErr(){errEl.style.display='none';errEl.textContent=''}
function setLoad(l){subBtn.disabled=l;btnText.style.display=l?'none':'inline';btnLoad.style.display=l?'inline-flex':'none'}
</script>
</body>
</html>
